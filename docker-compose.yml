services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nextpress
      POSTGRES_USER: nextpress
      POSTGRES_PASSWORD: nextpress
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextpress -d nextpress"]
      interval: 5s
      timeout: 5s
      retries: 10

  strapi:
    build:
      context: .
      dockerfile: strapi/Dockerfile
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: nextpress
      DATABASE_USERNAME: nextpress
      DATABASE_PASSWORD: nextpress
      JWT_SECRET: ${JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      NEXTPRESS_SEED_APP_USER: ${NEXTPRESS_SEED_APP_USER:-false}
      NEXTPRESS_DEFAULT_USER_EMAIL: ${NEXTPRESS_DEFAULT_USER_EMAIL:-admin@nextpress.local}
      NEXTPRESS_DEFAULT_USER_PASSWORD: ${NEXTPRESS_DEFAULT_USER_PASSWORD:-NextPressDev123}
      NEXTPRESS_DEFAULT_USER_USERNAME: ${NEXTPRESS_DEFAULT_USER_USERNAME:-nextpress}
      WEB_REVALIDATE_URL: http://web:${WEB_PORT:-3001}
      REVALIDATION_SECRET: ${REVALIDATION_SECRET:-change-me-revalidation-secret}
      PORT: ${STRAPI_PORT:-1338}
    ports:
      - "${STRAPI_PORT:-1338}:${STRAPI_PORT:-1338}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:${STRAPI_PORT:-1338}/api/pages?pagination[pageSize]=1').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s
    working_dir: /app/strapi
    volumes:
      - .:/app
      - strapi_root_node_modules:/app/node_modules
      - strapi_node_modules:/app/strapi/node_modules
      - strapi_uploads:/app/strapi/public/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      RUNNING_IN_DOCKER: "true"
      # Server-side URL on the Docker network — must not be localhost
      CMS_URL: http://strapi:${STRAPI_PORT:-1338}
      NEXT_PUBLIC_STRAPI_URL: http://localhost:${STRAPI_PORT:-1338}
      STRAPI_URL: http://strapi:${STRAPI_PORT:-1338}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
      REVALIDATION_SECRET: ${REVALIDATION_SECRET:-change-me-revalidation-secret}
      PORT: ${WEB_PORT:-3001}
    ports:
      - "${WEB_PORT:-3001}:${WEB_PORT:-3001}"
    depends_on:
      strapi:
        condition: service_healthy
    working_dir: /app/apps/web
    volumes:
      - .:/app
      - web_root_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_next:/app/apps/web/.next

  react:
    profiles: ["react"]
    build:
      context: .
      dockerfile: apps/react/Dockerfile
    environment:
      VITE_STRAPI_URL: http://localhost:${STRAPI_PORT:-1338}
      VITE_CMS_URL: http://localhost:${STRAPI_PORT:-1338}
    ports:
      - "${REACT_PORT:-5174}:5173"
    depends_on:
      - strapi
    working_dir: /app/apps/react
    volumes:
      - .:/app
      - react_root_node_modules:/app/node_modules
      - react_app_node_modules:/app/apps/react/node_modules

volumes:
  pgdata:
  strapi_uploads:
  strapi_root_node_modules:
  strapi_node_modules:
  web_root_node_modules:
  web_app_node_modules:
  web_next:
  react_root_node_modules:
  react_app_node_modules:
